name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-opencomputer
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check Cloudflare credentials
        id: cloudflare-token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::notice::CLOUDFLARE_API_TOKEN is not set; skipping Cloudflare Pages deploy."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.cloudflare-token.outputs.present == 'true'

      - name: Build static artifact
        if: steps.cloudflare-token.outputs.present == 'true'
        run: |
          rm -rf dist
          mkdir -p dist/assets
          cp index.html styles.css script.js dist/
          cp assets/* dist/assets/

      - name: Deploy to Cloudflare Pages
        if: steps.cloudflare-token.outputs.present == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: b8f23cb87a7a6c64040d3134643da448
          command: pages deploy dist --project-name opencomputer --branch main
